name: Update News JSON G

on:
  schedule:
    - cron: '30 9 * * *'    # 香港 17:30
    - cron: '0 4 * * *'     # 香港 12:00
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download source JSON
        run: curl -fsSL https://iet2.hket.com/feature/worldcup2026/data-article-news.json -o data-article-news-g.json

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run script
        run: python update-news-g.py

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update news JSON $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
