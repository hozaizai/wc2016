name: Update Score Wiki

on:
  schedule:
    - cron: '30 22 * * *'   # ķ”ÖµĖ» 06:30
    - cron: '30 2 * * *'    # ķ”ÖµĖ» 10:30
    - cron: '0 5 * * *'     # ķ”ÖµĖ» 13:00
    - cron: '30 6 * * *'    # ķ”ÖµĖ» 14:30
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run script
        run: python update-score-wiki.py

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update score wiki $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
